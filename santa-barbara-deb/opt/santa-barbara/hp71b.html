<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>HP-71B Emulator</title>

<style>

body{
background:#111;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.calculator{

background:#2e2e2e;
padding:30px;
border-radius:15px;
box-shadow:0 0 40px black;
width:900px;

}

.lcd{

background:#003d00;
color:#00ff66;

font-size:34px;

letter-spacing:4px;

padding:20px;

border-radius:10px;

margin-bottom:30px;

height:50px;

display:flex;
align-items:center;

}

.keyboard{

display:grid;

grid-template-columns:repeat(10,1fr);

gap:10px;

}

.key{

background:#444;

color:white;

padding:12px;

text-align:center;

border-radius:5px;

cursor:pointer;

user-select:none;

}

.key:hover{

background:#666;

}

.key.red{

background:#d40000;

}

.key.yellow{

background:#e6b800;

color:black;

}

.key.blue{

background:#0099ff;

}

</style>

</head>

<body>

<div class="calculator">

<div id="lcd" class="lcd">
booting...
</div>

<div class="keyboard">

<div class="key red" onclick="press('ON')">ON</div>
<div class="key">IF</div>
<div class="key">THEN</div>
<div class="key">ELSE</div>
<div class="key">FOR</div>
<div class="key">TO</div>
<div class="key">STEP</div>
<div class="key">NEXT</div>
<div class="key">GOTO</div>
<div class="key">GOSUB</div>

<div class="key">Q</div>
<div class="key">W</div>
<div class="key">E</div>
<div class="key">R</div>
<div class="key">T</div>
<div class="key">Y</div>
<div class="key">U</div>
<div class="key">I</div>
<div class="key">O</div>
<div class="key">P</div>

<div class="key">A</div>
<div class="key">S</div>
<div class="key">D</div>
<div class="key">F</div>
<div class="key">G</div>
<div class="key">H</div>
<div class="key">J</div>
<div class="key">K</div>
<div class="key">L</div>
<div class="key">ENTER</div>

<div class="key">Z</div>
<div class="key">X</div>
<div class="key">C</div>
<div class="key">V</div>
<div class="key">B</div>
<div class="key">N</div>
<div class="key">M</div>
<div class="key">SPC</div>
<div class="key">←</div>
<div class="key">→</div>

<div class="key yellow">f</div>
<div class="key blue">g</div>
<div class="key">RUN</div>
<div class="key">LINE</div>
<div class="key">END</div>
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>

<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div class="key">0</div>

</div>

</div>

<script>

function updateLCD(){

fetch("/lcd?t="+Date.now())

.then(r=>r.text())

.then(t=>{

document.getElementById("lcd").innerText=t

})

}

setInterval(updateLCD,100)

function press(k){

fetch("/key",{
method:"POST",
body:k
})

}

</script>

</body>
</html>
