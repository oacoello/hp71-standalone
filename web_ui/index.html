<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SANTA BARBARA</title>

<style>
body{
background:#1b1b1b;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

.calculator{
background:#6f6f6f;
padding:30px;
border-radius:12px;
width:880px;
box-shadow:0 0 40px rgba(0,0,0,.7);
}

.lcd{
background:#cbbf97;
border-radius:6px;
margin-bottom:20px;
height:280px;
width:100%;
display:flex;
padding:8px;
box-sizing:border-box;
}

#lcdtext{
background:#1f1f1f;
color:#baff7c;
font-family:monospace;
font-size:20px;
line-height:1.35;
letter-spacing:1px;
width:100%;
height:100%;
overflow:hidden;
white-space:pre;
padding:12px;
box-sizing:border-box;
border:4px solid #bfb68c;
border-radius:4px;
}

.lcdbar{
width:44px;
height:100%;
margin-left:8px;
display:flex;
flex-direction:column;
gap:8px;
}

.lcdbar button{
width:44px;
height:50%;
background:#1f1f1f;
color:#baff7c;
border:3px solid #bfb68c;
font-size:24px;
border-radius:4px;
cursor:pointer;
}

.keyboard{
display:flex;
justify-content:space-between;
}

.left{
display:grid;
grid-template-columns:repeat(10,55px);
grid-gap:8px;
}

.right{
display:grid;
grid-template-columns:repeat(4,55px);
grid-gap:8px;
}

button{
width:55px;
height:42px;
border:none;
border-radius:6px;
background:#2b2b2b;
color:white;
font-size:15px;
cursor:pointer;
}

button.light{
background:#d7d7d7;
color:black;
}

button.yellow{
background:#e6c200;
color:black;
}

button.blue{
background:#4da6c8;
}

.endline{
height:92px;
grid-row:span 2;
}

button:active{
transform:scale(.95);
}
</style>
</head>

<body>

<div class="calculator">

<div class="lcd">
    <div id="lcdtext">SANTA BARBARA</div>

    <div class="lcdbar">
        <button onclick="prevPiece()">▲</button>
        <button onclick="nextPiece()">▼</button>
    </div>
</div>

<div class="keyboard">

<div class="left">
<button data="Q">Q</button>
<button data="W">W</button>
<button data="E">E</button>
<button data="R">R</button>
<button data="T">T</button>
<button data="Y">Y</button>
<button data="U">U</button>
<button data="I">I</button>
<button data="O">O</button>
<button data="P">P</button>

<button data="A">A</button>
<button data="S">S</button>
<button data="D">D</button>
<button data="F">F</button>
<button data="G">G</button>
<button data="H">H</button>
<button data="J">J</button>
<button data="K">K</button>
<button data="L">L</button>
<button data="=">=</button>

<button data="Z">Z</button>
<button data="X">X</button>
<button data="C">C</button>
<button data="V">V</button>
<button data="B">B</button>
<button data="N">N</button>
<button data="M">M</button>
<button data="(">(</button>
<button data=")">)</button>

<button class="endline" data="ENTER">ENDLINE</button>

<button data="ON">ON</button>
<button class="yellow" data="F">f</button>
<button class="blue" data="G">g</button>
<button data="RUN">RUN</button>
<button data="BACK">←</button>
<button data="RIGHT">→</button>
<button data=" ">SPC</button>
<button data="UP">↑</button>
<button data="DOWN">↓</button>
</div>

<div class="right">
<button class="light" data="7">7</button>
<button class="light" data="8">8</button>
<button class="light" data="9">9</button>
<button class="light" data="/">/</button>

<button class="light" data="4">4</button>
<button class="light" data="5">5</button>
<button class="light" data="6">6</button>
<button class="light" data="*">*</button>

<button class="light" data="1">1</button>
<button class="light" data="2">2</button>
<button class="light" data="3">3</button>
<button class="light" data="-">-</button>

<button class="light" data="0">0</button>
<button class="light" data=".">.</button>
<button class="light" data=",">,</button>
<button class="light" data="+">+</button>
</div>

</div>
</div>

<script>
let buffer = "";
let screenText = "SANTA BARBARA";

let pieces = [];
let pieceIndex = 0;
let pieceMode = false;

function parsePieces(text){

```
let lines = text.split(/\r?\n/);
let result = [];
let current = [];

for(let line of lines){

    let clean = line.trim();

    // 🔥 detectar PIECE aunque venga sucio
    if(clean.includes("PIECE") && clean.includes("-----")){

        if(current.length > 0){
            result.push(current.join("\n"));
        }

        current = [clean];
        continue;
    }

    if(current.length > 0){

        // ignorar basura final
        if(clean.startsWith("COMP CORR") || clean.startsWith("TESON")){
            continue;
        }

        if(clean !== ""){
            current.push(clean);
        }
    }
}

if(current.length > 0){
    result.push(current.join("\n"));
}

return result;
```

}


function renderLCD(){
    let lcd = document.getElementById("lcdtext");

    if(pieceMode && pieces.length > 0){
        lcd.innerText =
            pieces[pieceIndex] +
            "\n\nPIECE " + (pieceIndex + 1) + "/" + pieces.length +
            "\n▲ PREV   ▼ NEXT";
        return;
    }

    let text = screenText;

    if(buffer.length > 0){
        text += "\n> " + buffer;
    }

    lcd.innerText = text;
}

function nextPiece(){
    if(!pieceMode || pieces.length === 0) return;

    if(pieceIndex < pieces.length - 1){
        pieceIndex++;
    }

    renderLCD();
}

function prevPiece(){
    if(!pieceMode || pieces.length === 0) return;

    if(pieceIndex > 0){
        pieceIndex--;
    }

    renderLCD();
}

function send(cmd){
    fetch("/input",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"cmd="+encodeURIComponent(cmd)
    })
    .then(r=>r.text())
    .then(t=>{

        buffer = "";

        let foundPieces = parsePieces(t);

        if(foundPieces.length > 0){
            pieces = foundPieces;
            pieceIndex = 0;
            pieceMode = true;
            renderLCD();
            return;
        }

        pieceMode = false;
        screenText = t;
        renderLCD();
    });
}

document.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click",()=>{
        let key = btn.getAttribute("data");
        if(!key) return;

        if(key === "UP"){
            prevPiece();
            return;
        }

        if(key === "DOWN"){
            nextPiece();
            return;
        }

        if(key === "RUN"){
            pieceMode = false;
            send("MAIN");
            return;
        }

        if(key === "ENTER"){
            if(buffer.length === 0){
                send("MAIN");
                return;
            }

            send(buffer);
            return;
        }

        if(key === "BACK"){
            buffer = buffer.slice(0,-1);
            renderLCD();
            return;
        }

        pieceMode = false;
        buffer += key;
        renderLCD();
    });
});

document.addEventListener("keydown", function(event){
    let key = event.key;

    if(key === "ArrowUp"){
        prevPiece();
        event.preventDefault();
        return;
    }

    if(key === "ArrowDown"){
        nextPiece();
        event.preventDefault();
        return;
    }

    if(key === "Enter"){
        if(buffer.length === 0){
            send("MAIN");
            return;
        }

        send(buffer);
        return;
    }

    if(key === "Backspace"){
        buffer = buffer.slice(0,-1);
        renderLCD();
        event.preventDefault();
        return;
    }

    if(!isNaN(key)){
        pieceMode = false;
        buffer += key;
        renderLCD();
        return;
    }

    if(key.length === 1 && /[a-zA-Z]/.test(key)){
        pieceMode = false;
        buffer += key.toUpperCase();
        renderLCD();
        return;
    }

    if(key === " "){
        pieceMode = false;
        buffer += " ";
        renderLCD();
        return;
    }

    if(["+", "-", "*", "/", ".", ",", "(", ")"].includes(key)){
        pieceMode = false;
        buffer += key;
        renderLCD();
        return;
    }
});

renderLCD();
</script>

</body>
</html>
